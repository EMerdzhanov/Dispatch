name: dispatch_app
description: Dispatch — terminal manager for Claude Code
version: 0.1.0
publish_to: none
homepage: https://github.com/EMerdzhanov/Dispatch

environment:
  sdk: ^3.11.0
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  dispatch_terminal:
    path: ../dispatch_terminal
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.6.0
  drift: ^2.22.0
  sqlite3_flutter_libs: ^0.5.0
  window_manager: ^0.4.0
  path_provider: ^2.1.0
  path: ^1.9.0
  encrypt: ^5.0.3
  uuid: ^4.5.0
  file_picker: ^8.0.0
  xterm:
    path: ../xterm_local
  flutter_pty: ^0.4.2
  webview_flutter: ^4.13.1
  webview_flutter_wkwebview: ^3.24.1
  shelf: ^1.4.0
  shelf_router: ^1.1.0
  json_rpc_2: ^3.0.0
  crypto: ^3.0.7
  flutter_markdown: ^0.7.7+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.22.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.6.0
  lints: ^6.1.0

flutter:
  uses-material-design: true

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141428"/>
      <stop offset="100%" stop-color="#0a0a18"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-box">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="200" ry="200" fill="url(#bg)"/>

  <!-- Glowing terminal box — centered at 512,512 -->
  <g filter="url(#glow-box)">
    <rect x="192" y="212" width="640" height="600" rx="40" fill="none" stroke="#00eeff" stroke-width="8"/>
  </g>
  <rect x="192" y="212" width="640" height="600" rx="40" fill="rgba(0,238,255,0.03)"/>

  <!-- Chevrons centered at 512,512 -->
  <g filter="url(#glow)">
    <polyline points="332,420 442,512 332,604" fill="none" stroke="#0066ff" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g filter="url(#glow)">
    <polyline points="512,420 622,512 512,604" fill="none" stroke="#3388ff" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
